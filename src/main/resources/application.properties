spring.application.name=VoidStrike

# Behind Nginx, bind only to localhost so the app is not publicly exposed.
server.address=127.0.0.1
server.port=8080

# Trust reverse proxy headers from Nginx:
# X-Forwarded-For, X-Forwarded-Proto, X-Forwarded-Host
server.forward-headers-strategy=framework

# Lower latency for static assets and API responses.
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,text/javascript,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024

server.tomcat.threads.max=80
server.tomcat.accept-count=200
server.tomcat.max-connections=300
server.tomcat.keep-alive-timeout=30s
server.tomcat.max-keep-alive-requests=1000

# WebSocket origin configuration.
# Local testing:
# app.websocket.allowed-origins=http://localhost:8080,http://127.0.0.1:8080
#
# Production behind Nginx (replace with your domain):
# app.websocket.allowed-origins=https://your-domain.com,https://www.your-domain.com
app.websocket.allowed-origins=http://localhost:8080,http://127.0.0.1:8080

# Game simulation and networking.
app.game.ticks-per-second=30
app.game.websocket-send-time-limit-ms=15
app.game.websocket-send-buffer-size-bytes=524288

# World files: scene.json, collision-profiles.json, spawn-points.json.
# Local dev: save/load from project sources (same folder you edit in the IDE).
# Production (systemd): APP_WORLD_DATA_DIR=data/world keeps files outside the JAR.
app.world.data-dir=src/main/resources/static/world
